name: Changesets
on:
  push:
    branches:
      - main
    paths-ignore:
      - data/words.ljson
      - data/words.idx
      - CHANGELOG.md

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  version:
    name: Version packages
    if: ${{ github.repository == 'birchill/10ten-ja-reader' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinned below 11.12.0: that release's self-update logic crashes (pnpm/pnpm#12959).
          version: 11.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create or update release PR
        id: changesets
        uses: changesets/action@v1
        with:
          github-token: ${{ secrets.PUSH_TOKEN }}
          version: pnpm changeset-version
          title: 'Release next version'
          commit: 'chore: bump version'
          createGithubReleases: false

      - name: Generate release notes preview
        if: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: node ./scripts/release-notes-preview.js > release-notes-preview.md

      - name: Add preview to step summary
        if: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: cat release-notes-preview.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment release notes preview
        if: ${{ steps.changesets.outputs.pullRequestNumber }}
        env:
          GITHUB_TOKEN: ${{ secrets.PUSH_TOKEN }}
          RELEASE_NOTES_PREVIEW_PATH: release-notes-preview.md
          RELEASE_PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: node ./scripts/comment-release-notes-preview.js
