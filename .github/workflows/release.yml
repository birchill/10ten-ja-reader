name: Release
on:
  push:
    branches:
      - main
    paths-ignore:
      - data/words.ljson
      - data/words.idx
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    concurrency:
      group: app-store-connect-build-number
      cancel-in-progress: false
    outputs:
      sha: ${{ steps.release_ref.outputs.sha }}
      should_release: ${{ steps.out.outputs.should_release }}
      version: ${{ steps.out.outputs.version }}
      build_number: ${{ steps.build_number.outputs.value }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Check release version
        id: out
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "v${version} already exists; skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "v${version} does not exist; preparing release."
          fi

      - name: Get next App Store Connect build number
        id: build_number
        if: ${{ steps.out.outputs.should_release == 'true' }}
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          build_number=$(node ./scripts/get-app-store-build-number.js jp.co.birchill.tenten-ja-reader)
          echo "value=${build_number}" >> "$GITHUB_OUTPUT"
          echo "Using App Store Connect build number: ${build_number}"

      - name: Set Git username
        if: ${{ steps.out.outputs.should_release == 'true' }}
        run: |-
          git config --global user.name "Release"
          git config --global user.email "actions@users.noreply.github.com"

      - name: Install pnpm
        if: ${{ steps.out.outputs.should_release == 'true' }}
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install dependencies
        if: ${{ steps.out.outputs.should_release == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Update word snapshot
        if: ${{ steps.out.outputs.should_release == 'true' }}
        run: pnpm update-snapshot

      - name: Commit and push updated word snapshot
        if: ${{ steps.out.outputs.should_release == 'true' }}
        run: |-
          git add data/words.ljson data/words.idx
          if git diff --cached --quiet; then
            echo "Word snapshot is already up to date."
            exit 0
          fi

          timestamp=$(date -u)
          git commit -m "chore: Update word snapshot (${timestamp})"
          git push

      - name: Set release ref
        id: release_ref
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build_macos:
    # Keep the Safari build/sign/upload steps in this job in sync with
    # `.github/workflows/create-safari-test-build.yml`'s `build` job.
    name: Build Safari assets
    runs-on: macos-26
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Xcode build number
        env:
          NEXT_XCODE_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
        run: pnpm tsx scripts/sync-xcode --build-number-only

      - name: Build extension code
        run: pnpm build:safari

      - name: Install signing certificate and profile
        env:
          CERT_BASE64: ${{ secrets.APP_STORE_CERT_BASE64 }}
          MAC_INSTALLER_CERT_BASE64: ${{ secrets.MAC_INSTALLER_CERT_BASE64 }}
          MAC_INSTALLER_CERT_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
          P12_PASSWORD: ${{ secrets.APP_STORE_CERT_PASSWORD }}
          PROFILE_IOS: ${{ secrets.IOS_PROFILE_BASE64 }}
          PROFILE_IOS_EXT: ${{ secrets.IOS_EXT_PROFILE_BASE64 }}
          PROFILE_MAC: ${{ secrets.MAC_PROFILE_BASE64 }}
          PROFILE_MAC_EXT: ${{ secrets.MAC_EXT_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Save the cert and profiles to temp files
          echo -n "$CERT_BASE64" | base64 --decode > cert.p12
          echo -n "$MAC_INSTALLER_CERT_BASE64" | base64 --decode > mac-installer.p12
          echo -n "$PROFILE_IOS" | base64 --decode > ios.mobileprovision
          echo -n "$PROFILE_IOS_EXT" | base64 --decode > ios-ext.mobileprovision
          echo -n "$PROFILE_MAC" | base64 --decode > mac.provisionprofile
          echo -n "$PROFILE_MAC_EXT" | base64 --decode > mac-ext.provisionprofile

          # Create a temporary keychain and import the .p12 certificate
          security delete-keychain build.keychain-db 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          security import cert.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k build.keychain-db
          security import mac-installer.p12 -P "$MAC_INSTALLER_CERT_PASSWORD" -A -t cert -f pkcs12 -k build.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" build.keychain-db
          security list-keychain -d user -s build.keychain-db

          # Install provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ios.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          cp ios-ext.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          cp mac.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/
          cp mac-ext.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Mac app
        run: |
          xcodebuild archive \
            -project "xcode13/10ten Japanese Reader.xcodeproj" \
            -scheme "10ten Japanese Reader (macOS)" \
            -configuration Release \
            -archivePath $GITHUB_WORKSPACE/build/10ten-mac.xcarchive

      - name: Build iOS app
        run: |
          xcodebuild archive \
            -project "xcode13/10ten Japanese Reader.xcodeproj" \
            -scheme "10ten Japanese Reader (iOS)" \
            -configuration Release \
            -archivePath $GITHUB_WORKSPACE/build/10ten-iOS.xcarchive \
            -destination 'generic/platform=iOS'

      - name: Export Mac app package
        run: |
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/10ten-mac.xcarchive \
            -exportOptionsPlist "xcode13/ExportOptions-Mac.plist" \
            -exportPath $GITHUB_WORKSPACE/build

      - name: Export iOS app package
        run: |
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/10ten-iOS.xcarchive \
            -exportOptionsPlist "xcode13/ExportOptions-iOS.plist" \
            -exportPath $GITHUB_WORKSPACE/build

      - name: Upload macOS package to App Store Connect
        env:
          APP_APPLE_ID: ${{ vars.APP_APPLE_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          API_PRIVATE_KEYS_DIR: ${{ runner.temp }}/private_keys
        run: |
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          cat > "$API_PRIVATE_KEYS_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" <<'EOF'
          ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          EOF

          xcrun altool --upload-package \
            "$GITHUB_WORKSPACE/build/10ten Japanese Reader.pkg" \
            --platform macos \
            --apple-id "$APP_APPLE_ID" \
            --bundle-version "${{ needs.prepare.outputs.build_number }}" \
            --bundle-short-version-string "${{ needs.prepare.outputs.version }}" \
            --bundle-id "jp.co.birchill.tenten\-ja\-reader" \
            --api-key "$APP_STORE_CONNECT_KEY_ID" \
            --api-issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

      - name: Upload iOS package to App Store Connect
        env:
          APP_APPLE_ID: ${{ vars.APP_APPLE_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          API_PRIVATE_KEYS_DIR: ${{ runner.temp }}/private_keys
        run: |
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          cat > "$API_PRIVATE_KEYS_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" <<'EOF'
          ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          EOF

          xcrun altool --upload-package \
            "$GITHUB_WORKSPACE/build/10ten Japanese Reader.ipa" \
            --platform ios \
            --apple-id "$APP_APPLE_ID" \
            --bundle-version "${{ needs.prepare.outputs.build_number }}" \
            --bundle-short-version-string "${{ needs.prepare.outputs.version }}" \
            --bundle-id "jp.co.birchill.tenten\-ja\-reader" \
            --api-key "$APP_STORE_CONNECT_KEY_ID" \
            --api-issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: mac-packages
          path: |
            ${{ github.workspace }}/build/*.ipa
            ${{ github.workspace }}/build/*.pkg
            ${{ github.workspace }}/build/DistributionSummary.plist
            ${{ github.workspace }}/build/ExportOptions.plist
            ${{ github.workspace }}/build/Packaging.log
          if-no-files-found: error
          retention-days: 3

      - name: Cleanup signing material
        if: always()
        shell: bash
        run: |
          set +e

          # Remove temp files from workspace
          rm -f cert.p12 mac-installer.p12 \
            ios.mobileprovision ios-ext.mobileprovision \
            mac.provisionprofile mac-ext.provisionprofile
          rm -rf "$RUNNER_TEMP/private_keys"

          # Remove installed provisioning profiles
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/ios.mobileprovision
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/ios-ext.mobileprovision
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/mac.provisionprofile
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/mac-ext.provisionprofile

          # Remove temporary keychain
          security delete-keychain build.keychain-db || true

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [prepare, build_macos]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Set Git username
        run: |-
          git config --global user.name "Release"
          git config --global user.email "actions@users.noreply.github.com"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Build assets
        run: |
          pnpm install --frozen-lockfile
          scripts/build-assets.sh
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}

      - name: Tag
        run: |
          git tag -a "v${{ needs.prepare.outputs.version }}" -m "Release v${{ needs.prepare.outputs.version }}"
          git push origin "v${{ needs.prepare.outputs.version }}"

      - name: Create draft release + upload assets
        run: |
          node ./scripts/release-notes.js "${{ needs.prepare.outputs.version }}" > release-notes.md
          gh release create "v${{ needs.prepare.outputs.version }}" \
            --draft \
            --verify-tag \
            --title "Release ${{ needs.prepare.outputs.version }}" \
            --notes-file release-notes.md \
            release-assets/*
        # TODO: See if `gh release create` returns a URL to the created release
        # and, if so, output it to the step summary so we can find it later,
        #
        # e.g.
        #
        #   echo 'Draft release: ${releaseUrl}' >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
